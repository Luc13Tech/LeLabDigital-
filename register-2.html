<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription | LeLabDigital</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/app.js" defer></script>
</head><body><body>
  <div class="auth-wrap">
    <div class="auth-card fade-in">
      <div class="auth-logo">
        <a href="../index.html" class="nav-logo" style="justify-content:center;">
          <div class="logo-icon">💡</div>
          <span class="logo-text">LeLab<span class="logo-accent">Digital</span></span>
        </a>
      </div>
      <h2 data-i18n="register_title">Créer un compte</h2>
      <p class="auth-sub">Rejoignez la communauté LeLabDigital</p>
      <div class="auth-err" id="reg-err"></div>
      <div class="form-group">
        <label class="form-label" data-i18n="reg_name">Nom complet</label>
        <input type="text" id="reg-name" class="form-input" placeholder="Jean Dupont" required>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="reg_email">Email</label>
        <input type="email" id="reg-email" class="form-input" placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="reg_pass">Mot de passe</label>
        <input type="password" id="reg-pass" class="form-input" placeholder="Minimum 6 caractères" required>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="reg_confirm">Confirmer le mot de passe</label>
        <input type="password" id="reg-confirm" class="form-input" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:.5rem;" onclick="doRegister()" data-i18n="reg_btn">Créer mon compte</button>
      <p class="auth-foot"><span data-i18n="reg_has_acc">Déjà un compte ?</span> <a href="login.html" data-i18n="reg_login">Se connecter</a></p>
      <p class="auth-foot" style="margin-top:.5rem;"><a href="../index.html" style="color:var(--gray);">← Retour à l'accueil</a></p>
    </div>
  </div>
  <script src="../js/app.js"></script>
  <script>
    applyTheme(); applyTranslations();
    const user = getCurrentUser();
    if(user) window.location.href = '../index.html';
    function doRegister(){
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass = document.getElementById('reg-pass').value;
      const confirm = document.getElementById('reg-confirm').value;
      const err = document.getElementById('reg-err');
      err.classList.remove('show');
      if(!name||!email||!pass||!confirm){ err.textContent='Veuillez remplir tous les champs.'; err.classList.add('show'); return; }
      if(pass.length < 6){ err.textContent='Le mot de passe doit contenir au moins 6 caractères.'; err.classList.add('show'); return; }
      if(pass !== confirm){ err.textContent='Les mots de passe ne correspondent pas.'; err.classList.add('show'); return; }
      const result = register(name, email, pass);
      if(result.success){ showToast('Compte créé avec succès ! Bienvenue 🎉'); setTimeout(()=>window.location.href='../index.html', 1400); }
      else{ err.textContent = result.msg; err.classList.add('show'); }
    }
  </script>
</body></html>
