<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion | LeLabDigital</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/app.js" defer></script>
</head><body><body>
  <div class="auth-wrap">
    <div class="auth-card fade-in">
      <div class="auth-logo">
        <a href="../index.html" class="nav-logo" style="justify-content:center;">
          <div class="logo-icon">💡</div>
          <span class="logo-text">LeLab<span class="logo-accent">Digital</span></span>
        </a>
      </div>
      <h2 data-i18n="login_title">Connexion</h2>
      <p class="auth-sub">Accédez à votre espace membre LeLabDigital</p>
      <div class="auth-err" id="login-err"></div>
      <div class="form-group">
        <label class="form-label" data-i18n="login_email">Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="login_pass">Mot de passe</label>
        <input type="password" id="login-pass" class="form-input" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:.5rem;" onclick="doLogin()" data-i18n="login_btn">Se connecter</button>
      <p class="auth-foot"><span data-i18n="login_no_acc">Pas encore de compte ?</span> <a href="register.html" data-i18n="login_register">S'inscrire</a></p>
      <p class="auth-foot" style="margin-top:.5rem;"><a href="../index.html" style="color:var(--gray);">← Retour à l'accueil</a></p>
    </div>
  </div>
  <script src="../js/app.js"></script>
  <script>
    applyTheme(); applyTranslations();
    const user = getCurrentUser();
    if(user) window.location.href = '../index.html';
    function doLogin(){
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;
      const err = document.getElementById('login-err');
      if(!email || !pass){ err.textContent='Veuillez remplir tous les champs.'; err.classList.add('show'); return; }
      const result = login(email, pass);
      if(result.success){ showToast('Connexion réussie ! Bienvenue 👋'); setTimeout(()=>window.location.href='../index.html', 1200); }
      else{ err.textContent = result.msg; err.classList.add('show'); }
    }
    document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  </script>
</body></html>
